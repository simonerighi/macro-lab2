name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Debug - show repo root
        run: |
          pwd
          ls -la
          echo "Node: $(node -v)"
          echo "npm:  $(npm -v)"
          echo "npm omit: $(npm config get omit)"
          if [ -f .npmrc ]; then
            echo "Found .npmrc:"
            sed -n '1,200p' .npmrc
          else
            echo "No .npmrc in repo root."
          fi

      - name: Install (force devDependencies)
        run: |
          npm config delete omit || true
          npm config set omit ""
          npm install --include=dev

      - name: Debug - verify vite exists
        run: |
          echo "npm omit after install: $(npm config get omit)"
          ls -la node_modules/.bin || true
          npx --version
          npx vite --version
          npm ls vite || true

      - name: Build
        run: npm run build

      - name: Debug - dist contents
        run: |
          echo "Dist listing:"
          ls -la dist
          echo "Dist top-level files:"
          find dist -maxdepth 2 -type f | sed -n '1,120p'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
