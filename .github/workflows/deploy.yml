name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Debug - versions and repo root
        run: |
          pwd
          ls -la
          echo "Node: $(node -v)"
          echo "npm:  $(npm -v)"
          test -f package.json && echo "package.json OK" || (echo "package.json MISSING" && exit 1)
          test -f package-lock.json && echo "package-lock.json OK" || (echo "package-lock.json MISSING (commit it!)" && exit 1)

      # OPTIONAL but recommended: avoid npm 10.x flakiness on runners
      - name: Pin npm to stable version
        run: |
          npm install -g npm@9.9.4
          echo "npm pinned to: $(npm -v)"

      - name: Clean install (deterministic)
        run: npm ci

      - name: Debug - verify vite is installed
        run: |
          ls -la node_modules/.bin | sed -n '1,120p'
          node_modules/.bin/vite --version
          npm ls vite || true

      - name: Build
        run: npm run build

      - name: Debug - dist
        run: |
          ls -la dist
          find dist -maxdepth 2 -type f | sed -n '1,120p'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
